; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; KULLANIM:
;   Ana uçuş yazılımı   → pio run -e ucus     --target upload
;   Kalman filtre testi → pio run -e kalman    --target upload
;   Video (test/lora)   → pio run -e video     --target upload
;   I2C cihaz tarama    → pio run -e i2ctest   --target upload
;   LoRa dinleyici      → pio run -e loradinle --target upload
;   Gorev yuku (BGY)    → pio run -e gorevyuku --target upload
;   Funye atesleyici    → pio run -e funye     --target upload  (guc->10s->LED->10s->funye)
;   DEBUG / Teshis      → pio run -e ucusdebug --target upload  (her seyi USB seri monitore basar)
;
;   Ya da VS Code'da sol altta ortam seçici ile değiştir.

; ── Ortak ayarlar (tüm env'ler buradan miras alır) ──────────────
[common]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_port   = /dev/cu.usbserial-0001
lib_deps =
    adafruit/Adafruit BNO055 @ ^1.6.3
    adafruit/Adafruit BME280 Library @ ^2.2.4
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/Adafruit Unified Sensor @ ^1.1.14

; ── 1) Ana uçuş yazılımı (src/main.cpp) ─────────────────────────
[env:ucus]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
lib_deps      = ${common.lib_deps}
; src/ klasöründeki main.cpp derlenir, Test klasörü dışarıda kalır
build_src_filter = +<*> -<../Test videolari pertinaks/>

; ── 2) Kalman filtre testi ───────────────────────────────────────
[env:kalman]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
lib_deps      = ${common.lib_deps}
; Sadece kalman_test.cpp derlenir, src/main.cpp DIŞARIDA
build_src_filter = -<*> +<../Test videolari pertinaks/kalman_test.cpp>

; ── 3) Video / LoRa testi ────────────────────────────────────────
[env:video]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
lib_deps      = ${common.lib_deps}
; Sadece video.cpp derlenir
build_src_filter = -<*> +<../Test videolari pertinaks/video.cpp>

; ── 4) I2C cihaz tarama / deneme (I2C_Test/i2c_test.cpp) ─────────
[env:i2ctest]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
lib_deps      = ${common.lib_deps}
; Sadece i2c_test.cpp derlenir, src/main.cpp DIŞARIDA
build_src_filter = -<*> +<../I2C_Test/i2c_test.cpp>

; ── 5) LoRa dinleyici (LoRa_Dinle/lora_dinle.cpp) ───────────────
[env:loradinle]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
; Sadece lora_dinle.cpp derlenir (Serial1 yerlesik, lib_deps gerekmez)
build_src_filter = -<*> +<../LoRa_Dinle/lora_dinle.cpp>

; ── 6) Bilimsel Gorev Yuku (GorevYukuYazilimi/gorevyuku.cpp) ─────
[env:gorevyuku]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
lib_deps      = ${common.lib_deps}
; Sadece gorevyuku.cpp derlenir, src/main.cpp DIŞARIDA
build_src_filter = -<*> +<../GorevYukuYazilimi/gorevyuku.cpp>

; ── 7) Funye Atesleyici (FunyeAtesleyici/funye_atesleyici.cpp) ──
;      guc -> 10s -> LED -> 10s -> funye. Varsayilan SIMULE (guvenli).
[env:funye]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
; Sadece funye_atesleyici.cpp derlenir, src/main.cpp DISARIDA
build_src_filter = -<*> +<../FunyeAtesleyici/funye_atesleyici.cpp>

; ── 8) DEBUG / Teshis (Debug/main_debug.cpp) — her seyi USB seri monitore basar ──
[env:ucusdebug]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port   = ${common.upload_port}
lib_deps      = ${common.lib_deps}
; Sadece Debug/main_debug.cpp derlenir, src/main.cpp DIŞARIDA
build_src_filter = -<*> +<../Debug/main_debug.cpp>

; ── Test ayarları ────────────────────────────────────────────────
[env:esp32dev]
platform  = ${common.platform}
board     = ${common.board}
framework = ${common.framework}
lib_deps  = ${common.lib_deps}
test_filter = test_ucus
test_speed  = 115200

